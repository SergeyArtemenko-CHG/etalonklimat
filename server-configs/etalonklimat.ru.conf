const http = require('http');
const fs = require('fs');
const FILE_PATH = '/tmp/chat_answers.json';

http.createServer((req, res) => {
  res.setHeader('Access-Control-Allow-Origin', '*');
  res.setHeader('Access-Control-Allow-Methods', 'POST, OPTIONS');
  res.setHeader('Access-Control-Allow-Headers', 'Content-Type');

  if (req.method === 'OPTIONS') {
    res.writeHead(204);
    res.end();
    return;
  }

  if (req.url.includes('/api/chat-replies') && req.method === 'POST') {
    let body = '';
    req.on('data', chunk => { body += chunk.toString(); });
    req.on('end', () => {
      try {
        const parsed = JSON.parse(body);
        const sessionId = parsed.sessionId || parsed.chatId; // Поддержка обоих имен
        let replies = [];
        
        if (fs.existsSync(FILE_PATH)) {
          const raw = fs.readFileSync(FILE_PATH, 'utf8');
          const data = JSON.parse(raw);
          // Ищем ключ в разных форматах
          const key = data[sessionId] ? sessionId : (data["[" + sessionId + "]"] ? "[" + sessionId + "]" : null);
          
          if (key && data[key]) {
            replies = [{ text: decodeURIComponent(data[key]), role: 'max', id: Date.now().toString() }];
            delete data[key];
            fs.writeFileSync(FILE_PATH, JSON.stringify(data));
            console.log('SENT REPLY FOR:', sessionId);
          }
        }
        
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ replies }));
      } catch (e) {
        console.error('Parse error:', e);
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ replies: [] }));
      }
    });
  } else {
    res.writeHead(404);
    res.end();
  }
}).listen(3001);
console.log('Micro-API (POST) running on port 3001');
